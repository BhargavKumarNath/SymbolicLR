# SymboLR Default Configuration
# All values match Rust core compiled defaults exactly.
#
# Rust source references:
#   crossover_rate, mutation_rate  →  rust_core/src/evolution.rs
#   size_bins, com_bins, smoothness_bins  →  rust_core/src/archive.rs
#
# DO NOT change these values without updating the corresponding Rust constants.

# Evolution
max_generations: 50
pop_size: 50
seed: 42
crossover_rate: 0.20
mutation_rate: 0.70

# MAP-Elites archive
size_bins: 30
com_bins: 20
smoothness_bins: 10

# Evaluator
evaluator: "synthetic"
time_steps: 100

# Logging
log_dir: "research_journal/experiments"
