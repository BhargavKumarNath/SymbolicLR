# research.yaml - Advanced Research Config

# Long-running defaults
default_generations: 30
default_pop_size: 100
default_epochs: 5
default_workers: 4
seed: 1337

# More aggressive diversity parameters
novelty_enabled: true
novelty_weight: 0.15
novelty_max_weight: 0.35
diversity_tracking_enabled: true
diversity_collapse_threshold: 0.40

# Restricting operator controller smoothing
operator_controller_enabled: true
operator_controller_ema_alpha: 0.20

# Aggressive meta-controller
meta_controller_enabled: true
stagnation_threshold: 4

# Diagnostics
diagnostics_enabled: true
diagnostics_export_path: "./results/research_run"

# Surrogate
surrogate_enabled: true
surrogate_min_samples: 50
surrogate_eval_fraction: 0.60
